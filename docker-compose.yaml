# immich compose file
# 2026-04-13 v0.4
#
# useful links:
# - immich installation guide: https://immich.app/docs/install/docker-compose
# - immich docker-compose file: https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
# - tailscale docker-compose file: https://github.com/tailscale-dev/docker-guide-code-examples/blob/main/01-authkey/compose.yaml
# - watchtower documentation: https://containrrr.dev/watchtower/

name: immich

services:
    watchtower:
        image: containrrr/watchtower:latest
        container_name: watchtower
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        environment:
            # only update containers with the watchtower enable label
            - WATCHTOWER_LABEL_ENABLE=true
            # remove old images after updating
            - WATCHTOWER_CLEANUP=true
            # check for updates daily at 4:00 AM
            - WATCHTOWER_SCHEDULE=0 0 4 * * *
            # optional: enable notifications (uncomment and configure)
            # - WATCHTOWER_NOTIFICATIONS=email
            # - WATCHTOWER_NOTIFICATION_EMAIL_FROM=...
            # - WATCHTOWER_NOTIFICATION_EMAIL_TO=...
        restart: unless-stopped

    tailscale:
        image: tailscale/tailscale:latest
        container_name: tailscale
        hostname: immich
        environment:
            # generated key from tailscale dashboard, avoid login procedure
            - TS_AUTHKEY=${TS_AUTHKEY}
            # ensures state is persisted to the mounted volume
            - TS_STATE_DIR=/var/lib/tailscale
            # note: find the domain exposed from ts serve with
            # `docker exec -it tailscale tailscale serve status`
            - TS_SERVE_CONFIG=/config/serve-config.json
            # userspace mode for QNAP kernel compatibility (avoids /dev/net/tun issues)
            - TS_USERSPACE=true
            # optional: if you want this NAS to be an exit node
            # - TS_EXTRA_ARGS=--advertise-tags=tag:container --reset --advertise-exit-node
        volumes:
            # stores tailscale's config for https connections
            - ./ts-config:/config
            # stores tailscale's state, to persist it across container restarts/recreations
            - ./ts-state:/var/lib/tailscale
        cap_add:
            # required for ts to modify network interfaces
            - net_admin
        healthcheck:
            test: ["CMD", "tailscale", "status"]
            interval: 1m
            timeout: 10s
            retries: 3
            start_period: 30s
        restart: unless-stopped
        labels:
            - "com.centurylinklabs.watchtower.enable=true"

    cloudflared:
        image: cloudflare/cloudflared:latest
        container_name: cloudflared
        command: tunnel run --token ${CF_TUNNEL_TOKEN}
        network_mode: service:tailscale
        depends_on:
            tailscale:
                condition: service_healthy
        restart: unless-stopped
        labels:
            - "com.centurylinklabs.watchtower.enable=true"

    immich-server:
        container_name: immich_server
        image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
        # extends:
        #   file: hwaccel.transcoding.yml
        #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
        volumes:
            - ${UPLOAD_LOCATION}:/usr/src/app/upload
            - ${X_MEDIA_LIB}:/media
            - /etc/localtime:/etc/localtime:ro
        env_file:
            - .env

        # -- network mode -------------------------------------------------
        # option A: expose via tailscale (default)
        network_mode: service:tailscale
        # option B: expose via direct port mapping (uncomment below, comment option A)
        # ports:
        #   - '2283:2283'
        # ------------------------------------------------------------------

        depends_on:
            tailscale:
                condition: service_healthy
            redis:
                condition: service_started
            database:
                condition: service_started
        restart: always
        healthcheck:
            disable: false
        labels:
            - "com.centurylinklabs.watchtower.enable=true"

    immich-machine-learning:
        container_name: immich_machine_learning
        # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
        # Example tag: ${IMMICH_VERSION:-release}-cuda
        image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
        # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
        #   file: hwaccel.ml.yml
        #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
        volumes:
            - model-cache:/cache
        env_file:
            - .env
        restart: always
        healthcheck:
            disable: false
        labels:
            - "com.centurylinklabs.watchtower.enable=true"

    redis:
        container_name: immich_redis
        image: docker.io/valkey/valkey:8-bookworm@sha256:42cba146593a5ea9a622002c1b7cba5da7be248650cbb64ecb9c6c33d29794b1
        healthcheck:
            test: redis-cli ping || exit 1
        restart: always

    database:
        container_name: immich_postgres
        image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
        environment:
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_USER=${DB_USERNAME}
            - POSTGRES_DB=${DB_DATABASE_NAME}
            - POSTGRES_INITDB_ARGS=--data-checksums
            # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
            # DB_STORAGE_TYPE: 'HDD'
        volumes:
            - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
        restart: always

volumes:
    model-cache:
